name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Ruff, Mypy, and Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups --no-install-project

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type check
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest
